<app-navbar></app-navbar>
<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Course</h1>
    <h1 *ngIf="form.data.id" align="center" style="margin-bottom: 5px; color: navy">Update Course</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{form.message}}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{form.message}}</h3>
   </div>

   <table>
    <tr>
        <th align="left">Name<span style="color: red">*</span></th>
        <td><input type="text" name="name" [(ngModel)]="form.data.name"placeholder="Enter Name"></td>
        <td style="position: fixed; color: red;">{{form.inputerror.name}}</td>
    </tr>

    <tr>
        <th align="left">Duration<span style="color: red">*</span></th>
        <td><input type="text" name="duration" [(ngModel)]="form.data.duration"placeholder="Enter Duration"></td>
        <td style="position: fixed; color: red;">{{form.inputerror.duration}}</td>
    </tr>

     <tr>
        <th align="left">Description<span style="color: red">*</span></th>
        <td><input type="text" name="description" [(ngModel)]="form.data.description"placeholder="Enter Description"></td>
        <td style="position: fixed; color: red;">{{form.inputerror.description}}</td>
    </tr>
     
    <tr></tr>

    <tr>
        <th></th>
        <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
                   <button (click)="forward('/courseList')">list</button>
            </td>
    </tr>
   </table>
</div>
<app-footer></app-footer>
