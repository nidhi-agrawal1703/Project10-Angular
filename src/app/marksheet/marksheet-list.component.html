<app-navbar></app-navbar>
<div align="center">
    <h1 align="center" style="margin-bottom: 5px; color: navy;">Marksheet List</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{form.message}}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{form.message}}</h3>
    </div>

    <div *ngIf="form.list.length>0">

        <table style="width:100%">
            <tr>
                <td align="center">
                    <label><b>Student Name:</b></label>
                    <input type="text" name="studentName" [(ngModel)]="form.searchParams.studentName" placeholder="Enter Student Name">&nbsp;
                    
                    <button (click)="search()">Search</button>
                    <button (click)="reset()">Reset</button>  
                </td>
            </tr>
        </table>

        <table border="1" style="width: 100%; border: groove;">
            <tr>
            <th><input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)"></th>
            <th>S.No.</th>
            <th>Roll No.</th>
            <th>Name</th>
            <th>Physics</th>
            <th>Chemistry</th>
            <th>Maths</th>
            <th>Edit</th>
            </tr>

            <tr align="center" *ngFor="let m of form.list; let i=index">
                <td><input type="checkbox" #checkboxes (change)="checkListUpdate()" [id]="m.id" [value]="isMasterSel"></td>
                <td>{{(form.pageNo*5)+i+1}}</td>
                <td>{{m.rollNo}}</td>
                <td>{{m.name}}</td>
                <td>{{m.physics}}</td>
                <td>{{m.chemistry}}</td>
                <td>{{m.maths}}</td>
                <td><a (click)="forward('/marksheet/'+m.id)">Edit</a></td>
            </tr>
        </table>

        <table style="width: 100%">
            <tr>
                <td style="width: 25%"><button (click)="previous()" [disabled]="form.pageNo ==0">Previous</button></td>
                <td align="center" style="width: 25%"><button (click)="forward('/marksheet')">New</button></td>
                <td align="center" style="width: 25%"><button (click)="deleteMany()">Delete</button></td>
                <td style="width: 25%" align="right"><button (click)="next()" [disabled]="form.nextListSize == 0">Next</button></td>
            </tr>
        </table>

    </div>
    <br>

    <div *ngIf="form.list.length == 0" ><button (click)="reset()">Back</button></div> 
</div>
<td></td>
<app-footer></app-footer>
